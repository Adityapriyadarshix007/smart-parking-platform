<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Revenue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <a href="/admin-dashboard" class="text-blue-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-green-50 rounded-xl shadow-md p-6 text-center"><div class="text-3xl font-bold text-green-600" id="totalRevenue">-</div><div class="text-gray-600">Total Revenue</div></div>
            <div class="bg-blue-50 rounded-xl shadow-md p-6 text-center"><div class="text-3xl font-bold text-blue-600" id="avgBooking">-</div><div class="text-gray-600">Average Booking</div></div>
            <div class="bg-purple-50 rounded-xl shadow-md p-6 text-center"><div class="text-3xl font-bold text-purple-600" id="totalBookings">-</div><div class="text-gray-600">Total Bookings</div></div>
        </div>
        <div class="bg-white rounded-xl shadow-md p-6"><h2 class="text-xl font-bold mb-4">Transactions</h2><div id="loading" class="text-center py-8"><div class="spinner"></div></div><div id="tableContainer" style="display:none;"><div class="overflow-x-auto"><table><thead><tr><th>User</th><th>Parking Slot</th><th>Amount</th><th>Date</th></tr></thead><tbody id="transactionsBody"></tbody></table></div></div></div>
    </div>
    <script>
        async function loadRevenue() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const res = await fetch('https://smart-parking-backend-tefg.onrender.com/api/v1/admin/bookings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const bookings = data.data;
                    const total = bookings.reduce((s, b) => s + (b.totalPrice || 0), 0);
                    document.getElementById('totalRevenue').innerText = `₹${total.toLocaleString()}`;
                    document.getElementById('avgBooking').innerText = `₹${Math.round(total / bookings.length).toLocaleString()}`;
                    document.getElementById('totalBookings').innerText = bookings.length;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tableContainer').style.display = 'block';
                    const tbody = document.getElementById('transactionsBody');
                    bookings.forEach(b => {
                        const row = tbody.insertRow();
                        row.innerHTML = `<td><div class="font-medium">${b.userId?.name || 'N/A'}</div><div class="text-xs text-gray-500">${b.userId?.email || ''}</div></td><td>${b.slotId?.title || 'N/A'}</td><td class="font-semibold text-green-600">₹${b.totalPrice}</td><td>${new Date(b.createdAt).toLocaleDateString()}</td>`;
                    });
                }
            } catch(e) { console.error(e); }
        }
        loadRevenue();
    </script>
</body>
</html>
