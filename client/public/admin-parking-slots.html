<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Parking Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        tr:hover { background: #f9fafb; }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <a href="/admin-dashboard" class="text-blue-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
        <div class="bg-white rounded-xl shadow-md p-6 mt-4">
            <h1 class="text-2xl font-bold mb-2">Parking Slots</h1>
            <p class="text-gray-600 mb-4" id="slotCount">Loading...</p>
            <input type="text" id="searchInput" placeholder="Search by title or city..." class="w-full px-4 py-2 border rounded-lg mb-4">
            <div id="loading" class="text-center py-8"><div class="spinner"></div></div>
            <div id="tableContainer" style="display:none;"><div class="overflow-x-auto"><table><thead><tr><th>Title</th><th>City</th><th>Total</th><th>Available</th><th>Rate</th><th>Status</th></tr></thead><tbody id="slotsBody"></tbody></table></div></div>
        </div>
    </div>
    <script>
        async function loadSlots() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const res = await fetch('https://smart-parking-backend-tefg.onrender.com/api/v1/admin/parking/all', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const slots = data.data;
                    document.getElementById('slotCount').innerText = `Total: ${slots.length} slots`;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tableContainer').style.display = 'block';
                    const tbody = document.getElementById('slotsBody');
                    slots.forEach(slot => {
                        const row = tbody.insertRow();
                        row.innerHTML = `<td class="font-medium">${slot.title || 'N/A'}</td><td>${slot.location?.city || 'N/A'}</td><td class="text-center">${slot.totalSlots || 0}</td><td class="text-center">${slot.availableSlots || 0}</td><td class="text-center">₹${slot.pricing?.hourly || 0}/hr</td><td class="text-center"><span class="px-2 py-1 rounded-full text-xs ${slot.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${slot.isActive ? 'Active' : 'Inactive'}</span></td>`;
                    });
                }
            } catch(e) { console.error(e); }
        }
        document.getElementById('searchInput').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const rows = document.querySelectorAll('#slotsBody tr');
            rows.forEach(row => {
                const text = row.cells[0].innerText.toLowerCase() + row.cells[1].innerText.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });
        loadSlots();
    </script>
</body>
</html>
