<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Parking Slots</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8">
        <a href="/admin-dashboard" class="text-blue-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
        <div class="bg-white rounded-xl shadow-md p-6">
            <h1 class="text-2xl font-bold mb-2">Parking Slots</h1>
            <p class="text-gray-600 mb-4" id="recordCount">Loading...</p>
            <input type="text" id="searchInput" placeholder="Search by title or city..." class="w-full px-4 py-2 border rounded-lg mb-4">
            <div id="loadingSpinner" class="flex justify-center py-12"><div class="spinner"></div></div>
            <div id="tableContainer" style="display:none;"><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3 text-left">Title</th><th class="p-3 text-left">City</th><th class="p-3 text-left">Total Slots</th><th class="p-3 text-left">Available</th><th class="p-3 text-left">Rate</th><th class="p-3 text-left">Status</th></tr></thead><tbody id="slotsTableBody"></tbody></table></div></div>
        </div>
    </div>
    <style>.spinner{border:3px solid #e5e7eb;border-top:3px solid #3b82f6;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto;}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>
    <script>
        let allSlots = [];
        async function loadSlots() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const response = await fetch('https://smart-parking-backend-tefg.onrender.com/api/v1/admin/parking/all', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (result.success && result.data) {
                    allSlots = result.data;
                    displaySlots();
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('tableContainer').style.display = 'block';
                }
            } catch (error) { console.error(error); }
        }
        function displaySlots() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSlots.filter(s => s.title?.toLowerCase().includes(searchTerm) || s.location?.city?.toLowerCase().includes(searchTerm));
            document.getElementById('recordCount').innerHTML = `Total: ${filtered.length} slots`;
            const tbody = document.getElementById('slotsTableBody'); tbody.innerHTML = '';
            filtered.forEach(slot => {
                const row = tbody.insertRow(); row.className = 'border-t';
                row.insertCell(0).innerHTML = slot.title || 'N/A';
                row.insertCell(1).innerHTML = slot.location?.city || 'N/A';
                row.insertCell(2).innerHTML = slot.totalSlots || 0;
                row.insertCell(3).innerHTML = slot.availableSlots || 0;
                row.insertCell(4).innerHTML = `₹${slot.pricing?.hourly || 0}/hr`;
                row.insertCell(5).innerHTML = `<span class="px-2 py-1 rounded-full text-xs ${slot.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${slot.isActive ? 'Active' : 'Inactive'}</span>`;
            });
        }
        document.getElementById('searchInput').addEventListener('input', displaySlots);
        loadSlots();
    </script>
</body>
</html>
