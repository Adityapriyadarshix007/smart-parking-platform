<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Parking Slots Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(to bottom right, #f8fafc, #eff6ff); }
        .spinner { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        table { border-collapse: collapse; width: 100%; }
        th { background-color: #f8fafc; font-weight: 600; color: #1e293b; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl text-white p-6 mb-8 shadow-lg">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">Parking Slots Management</h1>
                    <p class="text-blue-100 mt-1">View and manage all parking slots across India</p>
                </div>
                <a href="/admin-dashboard" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center gap-2">
                    ← Back to Dashboard
                </a>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6 card-hover">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Parking Slots</h2>
                    <p class="text-gray-500 mt-1">Complete list of all parking locations</p>
                </div>
                <div class="bg-blue-100 rounded-full px-4 py-2">
                    <span class="text-2xl font-bold text-blue-600" id="totalSlots">0</span>
                    <span class="text-blue-600"> Total Slots</span>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search by parking title or city..." 
                       class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <div class="absolute left-4 top-3.5 text-gray-400">🔍</div>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div id="loadingSpinner" class="py-12"><div class="spinner"></div></div>
            <div id="tableContainer" style="display: none;">
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Parking Title</th>
                                <th>City</th>
                                <th class="text-center">Total Slots</th>
                                <th class="text-center">Available</th>
                                <th class="text-center">Hourly Rate</th>
                                <th class="text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="slotsTableBody"></tbody>
                    </table>
                </div>
                <div class="p-4 bg-gray-50 border-t">
                    <p class="text-sm text-gray-500" id="recordCount"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allSlots = [];
        
        async function loadSlots() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            
            try {
                const response = await fetch('https://smart-parking-backend-tefg.onrender.com/api/v1/admin/parking/all', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                if (result.success && result.data) {
                    allSlots = result.data;
                    document.getElementById('totalSlots').innerText = allSlots.length;
                    displaySlots();
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('tableContainer').style.display = 'block';
                }
            } catch (error) { console.error(error); }
        }
        
        function displaySlots() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSlots.filter(s => 
                s.title?.toLowerCase().includes(searchTerm) || 
                s.location?.city?.toLowerCase().includes(searchTerm)
            );
            document.getElementById('recordCount').innerHTML = `Showing ${filtered.length} of ${allSlots.length} parking slots`;
            const tbody = document.getElementById('slotsTableBody');
            tbody.innerHTML = '';
            filtered.forEach(slot => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td class="font-medium text-gray-800">${slot.title || 'N/A'}</td>
                    <td class="text-gray-600">${slot.location?.city || 'N/A'}</td>
                    <td class="text-center font-semibold">${slot.totalSlots || 0}</td>
                    <td class="text-center ${slot.availableSlots > 0 ? 'text-green-600 font-semibold' : 'text-red-600'}">${slot.availableSlots || 0}</td>
                    <td class="text-center font-semibold text-green-600">₹${slot.pricing?.hourly || 0}<span class="text-gray-400 text-sm">/hr</span></td>
                    <td class="text-center">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${slot.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${slot.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                `;
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', displaySlots);
        loadSlots();
    </script>
</body>
</html>
