<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - All Bookings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .spinner { border: 3px solid #e5e7eb; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        tr:hover { background: #f9fafb; }
        .status-confirmed { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-pending { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-cancelled { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <a href="/admin-dashboard" class="text-blue-600 hover:underline mb-4 inline-block">← Back to Dashboard</a>
        <div class="bg-white rounded-xl shadow-md p-6 mt-4">
            <h1 class="text-2xl font-bold mb-2">All Bookings</h1>
            <p class="text-gray-600 mb-4" id="bookingCount">Loading...</p>
            <input type="text" id="searchInput" placeholder="Search by user, slot, or vehicle..." class="w-full px-4 py-2 border rounded-lg mb-4">
            <div id="loading" class="text-center py-8"><div class="spinner"></div></div>
            <div id="tableContainer" style="display:none;"><div class="overflow-x-auto"><table><thead><tr><th>User</th><th>Parking Slot</th><th>Vehicle</th><th>Date & Time</th><th>Amount</th><th>Status</th></tr></thead><tbody id="bookingsBody"></tbody></table></div></div>
        </div>
    </div>
    <script>
        function formatDate(d) { return new Date(d).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); }
        async function loadBookings() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const res = await fetch('https://smart-parking-backend-tefg.onrender.com/api/v1/admin/bookings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const bookings = data.data;
                    document.getElementById('bookingCount').innerText = `Total: ${bookings.length} bookings`;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tableContainer').style.display = 'block';
                    const tbody = document.getElementById('bookingsBody');
                    bookings.forEach(b => {
                        const statusClass = b.status === 'confirmed' ? 'status-confirmed' : b.status === 'pending' ? 'status-pending' : 'status-cancelled';
                        const row = tbody.insertRow();
                        row.innerHTML = `<td><div class="font-medium">${b.userId?.name || 'N/A'}</div><div class="text-xs text-gray-500">${b.userId?.email || ''}</div></td><td><div class="font-medium">${b.slotId?.title || 'N/A'}</div><div class="text-xs text-gray-500">${b.slotId?.location?.city || ''}</div></td><td>${b.vehicleNumber}</td><td>${formatDate(b.startTime)}<br><span class="text-xs text-gray-400">to ${formatDate(b.endTime)}</span></td><td class="font-semibold text-green-600">₹${b.totalPrice}</td><td><span class="${statusClass}">${b.status}</span></td>`;
                    });
                }
            } catch(e) { console.error(e); }
        }
        document.getElementById('searchInput').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const rows = document.querySelectorAll('#bookingsBody tr');
            rows.forEach(row => {
                const text = row.cells[0].innerText.toLowerCase() + row.cells[1].innerText.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });
        loadBookings();
    </script>
</body>
</html>
